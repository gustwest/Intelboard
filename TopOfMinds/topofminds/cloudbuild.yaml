# Cloud Build — auto-deploy TopOfMinds to staging on push to main
# Uses Kaniko for Docker layer caching (Chromium/Puppeteer layers cached)
# Triggered only when files in TopOfMinds/topofminds/ change
# Context set to subfolder since this is a monorepo

steps:
  # 1. Build + push with Kaniko (context = subfolder)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=TopOfMinds/topofminds/Dockerfile'
      - '--context=dir://TopOfMinds/topofminds'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/topofminds-repo/topofminds-app:$COMMIT_SHA'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/topofminds-repo/topofminds-app:latest'
      - '--cache=true'
      - '--cache-ttl=720h'
      - '--compressed-caching=false'
      - '--snapshot-mode=redo'
      - '--use-new-run'

  # 2. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'topofminds-app'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/topofminds-repo/topofminds-app:$COMMIT_SHA'
      - '--region=europe-north1'
      - '--allow-unauthenticated'
      - '--platform=managed'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
