steps:
  # 1. Bygg och pusha en image som används av både service och alla jobs.
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=The Insiders Insights /insider-graph-api/Dockerfile'
      - '--context=dir://The Insiders Insights /insider-graph-api'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:$COMMIT_SHA'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:latest'
      - '--cache=true'
      - '--cache-ttl=720h'
      - '--compressed-caching=false'
      - '--snapshot-mode=redo'
      - '--use-new-run'

  # 2. Deploy service (FastAPI, always-on).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'insider-graph-api'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:$COMMIT_SHA'
      - '--region=europe-north1'
      - '--allow-unauthenticated'
      - '--platform=managed'

  # 3. Uppdatera Cloud Run Jobs så de pekar på samma SHA som servicen.
  #    Jobben skapas första gången av scripts/bootstrap.sh — denna step
  #    misslyckas tyst om jobbet inte finns ännu (`|| true`).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        IMAGE=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:$COMMIT_SHA
        for JOB in scrape-active scrape-episodic compile-all-schemas polling-weekly xml-sync sunset-skills quarterly-linkedin-todo; do
          gcloud run jobs update $$JOB --image=$$IMAGE --region=europe-north1 || \
            echo "job $$JOB not yet created — run scripts/bootstrap.sh first"
        done

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
