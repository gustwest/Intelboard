steps:
  # 1. Bygg och pusha en image som används av både service och alla jobs.
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=The Insiders Insights /insider-graph-api/Dockerfile'
      - '--context=dir://The Insiders Insights /insider-graph-api'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:$COMMIT_SHA'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:latest'
      - '--cache=true'
      - '--cache-ttl=720h'
      - '--compressed-caching=false'
      - '--snapshot-mode=redo'
      - '--use-new-run'

  # 2. Deploy service (FastAPI, always-on). COMMIT_SHA exponeras som env-var så
  #    post-deploy-checken kan verifiera att rätt revision faktiskt serveras.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'insider-graph-api'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:$COMMIT_SHA'
      - '--region=europe-north1'
      - '--allow-unauthenticated'
      - '--platform=managed'
      # Clean-URL-cutover (docs/clean-url-cutover.md steg 4): profilsidorna serveras på
      # egen domän via HTTPS-LB + Cloud CDN, med rena katalog-URL:er (utan clients/-prefix).
      # NOTIFY_FROM_EMAIL = verifierad Brevo-avsändare (B1/B2-mejl).
      - '--update-env-vars=COMMIT_SHA=$COMMIT_SHA,CDN_BASE_URL=https://profiles.geogiraph.com,CDN_CLEAN_URLS=true,NOTIFY_FROM_EMAIL=noreply@geogiraph.com'
      # Brevo (EU) API-nyckel ur Secret Manager → utgående transaktionsmejl.
      - '--update-secrets=BREVO_API_KEY=insider-graph-brevo-api-key:latest,ADMIN_API_KEY=insider-graph-admin-api-key:latest'

  # 3. Uppdatera Cloud Run Jobs så de pekar på samma SHA som servicen.
  #    Jobben skapas första gången av scripts/bootstrap.sh — denna step
  #    misslyckas tyst om jobbet inte finns ännu (`|| true`).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        IMAGE=europe-north1-docker.pkg.dev/$PROJECT_ID/insider-graph-repo/insider-graph-api:$COMMIT_SHA
        for JOB in scrape-active scrape-website extract-all-claims compile-all-schemas polling-weekly xml-sync sunset-skills quarterly-linkedin-todo compute-trust-gap trust-gap-report warmth-probes risk-detect-all monthly-report-all customer-report-email-all crawl-health model-drift-scan model-availability-check cost-rollup lang-probe; do
          gcloud run jobs update $$JOB --image=$$IMAGE --region=europe-north1 \
            --update-env-vars=CDN_BASE_URL=https://profiles.geogiraph.com,CDN_CLEAN_URLS=true,NOTIFY_FROM_EMAIL=noreply@geogiraph.com,USAGE_LOG_BUCKET=insider-graph-usage-logs-$PROJECT_ID \
            --update-secrets=BREVO_API_KEY=insider-graph-brevo-api-key:latest || \
            echo "job $$JOB not yet created — run scripts/bootstrap.sh first"
        done

  # 4. CI-grind: model-availability-check --dry-run. Stoppar deployen om någon
  #    LIVE-modell i registret inte svarar (regions-glapp, ToS-brist, kvotfel).
  #    Detta är ENDA stället där policyn faktiskt blockerar — drift-scannen är
  #    mild, men "modellen finns inte i din region" får inte nå prod tyst. Body:
  #    kör jobbet med args-override och exit non-zero → step failar → build failar.
  #    Hoppas över om jobbet inte finns ännu (bootstrap inte körd).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        if gcloud run jobs describe model-availability-check --region=europe-north1 >/dev/null 2>&1; then
          echo "==> CI-grind: model-availability-check --dry-run"
          gcloud run jobs execute model-availability-check --region=europe-north1 \
            --args="-m,jobs.model_availability_check,--dry-run" --wait
        else
          echo "model-availability-check job not yet created — skip CI gate. Kör scripts/bootstrap.sh."
        fi

  # 5. Post-deploy-check: pinga /health, jämför commit_sha, verifiera scheduler-
  #    status, model-registry, ops_alerts, och att inga jobb failat senaste 24h.
  #    Failar exit ≠ 0 → bygget rött. Soft-fail bara för saknad frontend-URL.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        pip3 install --quiet --break-system-packages httpx
        API_URL=$(gcloud run services describe insider-graph-api --region=europe-north1 --format='value(status.url)')
        FE_URL=$(gcloud run services describe insiders-frontend --region=europe-north1 --format='value(status.url)' 2>/dev/null || true)
        echo "==> post-deploy-check (api=$$API_URL fe=$$FE_URL)"
        python3 'The Insiders Insights /insider-graph-api/scripts/post_deploy_check.py' \
          --api-url "$$API_URL" --frontend-url "$$FE_URL" --expected-sha "$COMMIT_SHA"

    secretEnv: ['ADMIN_API_KEY']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/insider-graph-admin-api-key/versions/latest
      env: 'ADMIN_API_KEY'
