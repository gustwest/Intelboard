# Cloud Build — auto-deploy Insiders Insights Frontend on push to main
# Triggered only when files in The Insiders Insights /frontend/ change
# Monorepo: bygg med Docker-buildern så -f (dockerfile) kan ligga åtskilt från
# context (subkatalogen). Kaniko resolverar --dockerfile relativt /workspace och
# plockade då rot-Dockerfilen i stället för frontend/Dockerfile — därav fel image.

steps:
  # 1. Build (context = subkatalog, dockerfile = explicit -f)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'The Insiders Insights /frontend/Dockerfile'
      - '-t'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/insiders-frontend-repo/insiders-frontend:$COMMIT_SHA'
      - '-t'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/insiders-frontend-repo/insiders-frontend:latest'
      - 'The Insiders Insights /frontend'

  # 1b. Push båda taggarna (Docker-buildern pushar inte själv).
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'europe-north1-docker.pkg.dev/$PROJECT_ID/insiders-frontend-repo/insiders-frontend']

  # 2. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'insiders-frontend'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/insiders-frontend-repo/insiders-frontend:$COMMIT_SHA'
      - '--region=europe-north1'
      - '--allow-unauthenticated'
      - '--platform=managed'
      # Håll ALLTID minst en varm instans: frontenden kör Next-proxyn (/api/graph) som
      # fan-out:ar ~9 samtidiga server-side-anrop per tung sida (t.ex. AI-synlighet). Skalar
      # tjänsten till 0 träffar bursten en kallstart → Cloud Run 429 "no available instance".
      # min=1 eliminerar det; max=10 ger burst-marginal. (API:t kör redan min=1/max=20.)
      - '--min-instances=1'
      - '--max-instances=10'
      # Server-only admin-nyckel för /api/graph-proxyn (når aldrig webbläsaren).
      - '--update-secrets=GRAPH_API_KEY=insider-graph-admin-api-key:latest'

  # 3. Post-deploy-check: pinga både frontend och API. Skickar INTE expected-sha
  #    (denna build deployar frontend — API:t har en tidigare SHA, som är OK).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        pip3 install --quiet --break-system-packages httpx
        API_URL=$(gcloud run services describe insider-graph-api --region=europe-north1 --format='value(status.url)' 2>/dev/null || true)
        FE_URL=$(gcloud run services describe insiders-frontend --region=europe-north1 --format='value(status.url)')
        echo "==> post-deploy-check (api=$$API_URL fe=$$FE_URL)"
        python3 'The Insiders Insights /insider-graph-api/scripts/post_deploy_check.py' \
          --api-url "$$API_URL" --frontend-url "$$FE_URL"

    secretEnv: ['ADMIN_API_KEY']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/insider-graph-admin-api-key/versions/latest
      env: 'ADMIN_API_KEY'
